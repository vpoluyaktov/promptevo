services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      # ── LLM Provider ──────────────────────────────────────────────────────
      # Switch provider by changing LLM_PROVIDER and setting the matching key,
      # then run: docker compose up --build -d
      #
      # Options: openrouter | anthropic | openai
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}

      # OpenRouter (default) — https://openrouter.ai/keys
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      # Anthropic direct — https://console.anthropic.com/keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # OpenAI direct — https://platform.openai.com/api-keys
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # ── App config ────────────────────────────────────────────────────────
      - PORT=8080
      - DB_PATH=/data/promptevo.db
    volumes:
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
